kind = "web"
previewPath = "/"
title = "Requiem Agent"
version = "1.0.0"
id = "artifacts/requiem-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19146

[services.development]
run = "pnpm --filter @workspace/requiem-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/requiem-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/requiem-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19146"
BASE_PATH = "/"
