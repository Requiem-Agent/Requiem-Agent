name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Build TypeScript workspace libs
        run: |
          cd lib/api-zod && npx tsc --noEmit 2>/dev/null || true && cd ../..
          cd lib/api-client-react && npx tsc --noEmit 2>/dev/null || true && cd ../..
      - run: pnpm run build 2>/dev/null || npx --yes vite build
        env:
          VITE_API_URL: https://rayig-dev.hf.space
          BASE_URL: /Requiem-Agent/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public
      - id: deployment
        uses: actions/deploy-pages@v4
