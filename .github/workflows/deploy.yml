name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      # Remove @replit/* packages and rebuild lock for CI
      - name: Prepare CI package.json
        run: |
          node -e "
            const fs=require('fs');
            const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));
            // Remove Replit-only packages
            const devDeps = pkg.devDependencies || {};
            Object.keys(devDeps).forEach(k => { if(k.startsWith('@replit/')) delete devDeps[k]; });
            // Pin workspace:* deps
            const deps = pkg.dependencies || {};
            Object.keys(deps).forEach(k => { if(deps[k]==='*') deps[k]='^1.0.0'; });
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          # Remove old lock file to avoid conflicts with modified package.json
          rm -f pnpm-lock.yaml
      - run: pnpm install --ignore-scripts
      - run: npx --yes vite build
        env:
          VITE_API_URL: https://rayig-dev.hf.space
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public
      - id: deployment
        uses: actions/deploy-pages@v4
