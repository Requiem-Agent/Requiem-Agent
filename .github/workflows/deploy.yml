name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      # Remove @replit/* packages that only exist inside Replit environment
      - name: Strip Replit-only devDeps
        run: |
          node -e "
            const fs=require('fs');
            const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));
            Object.keys(pkg.devDependencies||{}).forEach(k=>{if(k.startsWith('@replit/'))delete pkg.devDependencies[k];});
            fs.writeFileSync('package.json',JSON.stringify(pkg,null,2));
          "
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - run: npx --yes vite build
        env:
          VITE_API_URL: https://rayig-dev.hf.space
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public
      - id: deployment
        uses: actions/deploy-pages@v4
